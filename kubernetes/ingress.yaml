apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clinic-management-system-ingress
  namespace: clinic-management-system
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /SignUp.aspx
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/success-codes: '200,302'
  labels:
    app: clinic-management-system
spec:
  rules:
  - host: clinic-management-system.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: clinic-management-system-service
            port:
              number: 80